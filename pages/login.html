<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Project & Task Management System</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <!-- Header / Navigation Bar for Theme Switching -->
  <header class="login-header">
    <div class="logo-container">
      <span class="logo-icon">🚀</span>
      <span class="logo-text">ASE ProjectHub</span>
    </div>
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
      <svg id="theme-toggle-dark-icon" class="hidden" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
      </svg>
      <svg id="theme-toggle-light-icon" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464-4.95a1 1 0 111.414 1.414L13.536 7.88a1 1 0 11-1.414-1.414l1.414-1.414zm2.536 3.95a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.95 6.464a1 1 0 111.414 1.414l-1.414 1.414a1 1 0 11-1.414-1.414l1.414-1.414zM6 10a1 1 0 011-1h1a1 1 0 110 2H7a1 1 0 01-1-1zm1.464-4.95a1 1 0 111.414-1.414L10.293 5.12a1 1 0 11-1.414 1.414L7.464 5.05zM3 10a1 1 0 011-1h1a1 1 0 110 2H4a1 1 0 01-1-1zm1.464 4.95a1 1 0 111.414-1.414l1.414 1.414a1 1 0 11-1.414 1.414L4.464 14.95z" fill-rule="evenodd" clip-rule="evenodd"></path>
      </svg>
    </button>
  </header>

  <main class="login-container-wrapper">
    <div class="login-card">
      <div class="card-header">
        <h2>Welcome Back</h2>
        <p>Login to manage your internal employees' tasks and projects.</p>
      </div>

      <form id="login-form" novalidate>
        <div id="error-summary" class="error-summary hidden" role="alert"></div>

        <div class="input-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" name="email" placeholder="employee@company.com" required autocomplete="email">
          </div>
          <span class="field-error" id="email-error"></span>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" id="toggle-password" class="password-toggle-btn" aria-label="Toggle Password Visibility">👁️</button>
          </div>
          <span class="field-error" id="password-error"></span>
        </div>

        <div class="form-actions">
          <label class="checkbox-container">
            <input type="checkbox" id="remember-me">
            <span class="checkmark"></span>
            Keep me logged in
          </label>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          <span class="btn-text">Sign In</span>
          <span class="spinner hidden"></span>
        </button>
      </form>

      <div class="card-footer">
        <p>Allied Software Engineers &copy; 2026. All rights reserved.</p>
      </div>
    </div>
  </main>

  <script src="../js/auth.js"></script>
</body>
</html>
